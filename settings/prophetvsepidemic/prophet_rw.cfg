#===========================================================================
# SCENARIO CONFIGURATION
#===========================================================================
[ Scenario ]
Scenario.name = ProphetCheck_RandomWaypoint
Scenario.simulateConnections = true
Scenario.updateInterval = 1
Scenario.endTime = 274883
Scenario.nrofHostGroups = 1

#===========================================================================
# GROUP SETTINGS 
#===========================================================================
[ Group ]
Group.groupID = n
Group.nrofHosts = 41
Group.router = ProphetRouter
Group.bufferSize = 100M
Group.nrofInterfaces = 1
Group.interface1 = btInterface

Group.movementModel = RandomWaypoint

Group.msgTtl = 144

#===========================================================================
# Prophet Settings
#===========================================================================
ProphetRouter.secondsInTimeUnit = 30

#===========================================================================
# (HAGGLE)
#===========================================================================
[ Events ]
Events.nrof = 1

# Event 1
Events1.class = MessageEventGenerator
Events1.interval = 100, 300
Events1.size = 100k, 500k
Events1.hosts = 0, 40
Events1.prefix = RW_MSG

#===========================================================================
# WORLD & REPORT SETTINGS
#===========================================================================
[ MovementModel ]
MovementModel.worldSize = 5000, 5000
MovementModel.warmup = 0

[ Report ]
Report.nrofReports = 2
Report.reportDir = reports/ProphetvsEpidemic/RandomWaypoint
Report.report1 = MessageStatsReport
Report.report2 = MessageEventSplitReport
#===========================================================================
# SCENARIO CONFIGURATION
#===========================================================================
Scenario.name = Prophet_%%Group.forwardingPolicy%%_%%Group.queuePolicy%%
Scenario.simulateConnections = true
Scenario.updateInterval = 0.1
Scenario.endTime = 43200
Report.warmup = 0
Scenario.nrofHostGroups = 1

#===========================================================================
# INTERFACE SETTINGS
#===========================================================================
btInterface.type = SimpleBroadcastInterface
btInterface.transmitSpeed = 250k
btInterface.transmitRange = 100
btInterface.scanInterval = 2

#===========================================================================
# ROUTING & BATCH PARAMETERS
#===========================================================================
[ Group ]
Group.router = ProphetForwardingQueuePolicy

Group.forwardingPolicy = [GRTRMAX; GRTRSORT; GRTR; COIN]

Group.queuePolicy = [FIFO; MOFO; SHLI]

Group.coinProbability = 0.5

Group.bufferSize = 2M
Group.waitTime = 0, 120
Group.msgTtl = 300
Group.nrofInterfaces = 1
Group.interface1 = btInterface

ProphetRouter.secondsInTimeUnit = 30
ProphetRouter.beta = 0.25

#===========================================================================
# MOVEMENT & HOST SETTINGS
#===========================================================================
[ Group1 ]
Group1.groupID = A
Group1.waitTime = 10, 30 
Group1.speed = 0.8, 1.4
Group1.nrofHosts = 50
Group1.movementModel = RandomWaypoint

MovementModel.rngSeed = 1
MovementModel.worldSize = 1500, 1500
MovementModel.warmup = 1000

#===========================================================================
# EVENT CONFIGURATION
#===========================================================================
Events.nrof = 1
[ Events1 ]
Events1.class = MessageEventGenerator
Events1.interval = 100, 200 
Events1.size = 100k, 500k
Events1.hosts = 0, 49
Events1.prefix = M

#===========================================================================
# REPORTS SETTINGS
#===========================================================================
Report.nrofReports = 1
Report.reportDir = reports/Batch12/%%Group.forwardingPolicy%%_%%Group.queuePolicy%%
Report.report1 = MessageStatsReport
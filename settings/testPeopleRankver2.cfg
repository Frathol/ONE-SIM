#===========================================================================
# SCENARIO CONFIGURATION
#===========================================================================
[ Scenario ]
Scenario.name = PeopleRank-WithDampingFactor-%%PeopleRankver2.dampingFactor%%
Scenario.simulateConnections = true
Scenario.updateInterval = 1
# Simulasi selama 12 jam (43200 detik)
Scenario.endTime = 43200
Scenario.nrofHostGroups = 5

#===========================================================================
# OPTIMIZATION & WORLD SETTINGS
#===========================================================================
[ Optimization ]
Optimization.connectionAlg = 2
Optimization.cellSizeMult = 5
Optimization.randomizeUpdateOrder = true

[ Movement model settings ]
MovementModel.rngSeed = 42
# Ukuran dunia diperkecil agar kepadatan node (density) lebih tinggi
MovementModel.worldSize = 10000, 8000
MovementModel.warmup = 1000

#===========================================================================
# COMMON GROUP SETTINGS
#===========================================================================
[ Common settings ]
Group.movementModel = MapBasedMovement
Group.router = DecisionEngineRouter
Group.bufferSize = 10M
Group.transmitRange = 10
Group.transmitSpeed = 2M
Group.interface1 = btInterface
Group.nrofInterfaces = 1
# TTL dinaikkan ke 1440 menit (24 jam) agar pesan tidak cepat drop
Group.msgTtl = 1440
Group.nrofHosts = 20

#===========================================================================
# GROUP SPECIFIC SETTINGS
#===========================================================================

# Group 1: Pejalan Kaki (Mobilitas Rendah, Populasi Tinggi)
[ Group 1 ]
Group1.groupID = P
Group1.nrofHosts = 100
Group1.speed = 0.5, 1.5
Group1.waitTime = 0, 300

# Group 2: Mobil (Mobilitas Tinggi, Jangkauan Luas - Forwarder Bagus)
[ Group 2 ]
Group2.groupID = C
Group2.nrofHosts = 40
Group2.speed = 7, 13
Group2.waitTime = 10, 60
Group2.bufferSize = 20M

# Group 3: Kurir/Sepeda (Sering berpindah - High PeopleRank potential)
[ Group 3 ]
Group3.groupID = K
Group3.nrofHosts = 20
Group3.speed = 3, 6
Group3.waitTime = 0, 120

# Group 4: Bus/Tram Rute 1 (Node Populer karena rute tetap)
[ Group 4 ]
Group4.groupID = T1
Group4.nrofHosts = 5
Group4.movementModel = MapRouteMovement
Group4.routeFile = data/spatial/tram3.wkt
Group4.routeType = 1
Group4.speed = 8, 12
Group4.waitTime = 30, 60
Group4.bufferSize = 50M

# Group 5: Bus/Tram Rute 2
[ Group 5 ]
Group5.groupID = T2
Group5.nrofHosts = 5
Group5.movementModel = MapRouteMovement
Group5.routeFile = data/spatial/tram4.wkt
Group5.routeType = 2
Group5.speed = 8, 12
Group5.waitTime = 30, 60
Group5.bufferSize = 50M

#===========================================================================
# ROUTER & PEOPLE RANK SETTINGS
#===========================================================================
[ DecisionEngineRouter ]
DecisionEngineRouter.decisionEngine = decisionengine.PeopleRankver2
PeopleRankver2.dampingFactor = [0.3; 0.5; 0.85]

#===========================================================================
# MAP SETTINGS
#===========================================================================
[ Map based movement settings ]
MapBasedMovement.nrofMapFiles = 2
MapBasedMovement.mapFile1 = data/spatial/roads.wkt
MapBasedMovement.mapFile2 = data/spatial/main_roads.wkt

#===========================================================================
# REPORT SETTINGS
#===========================================================================
[ Reports ]
Report.nrofReports = 3
Report.warmup = 1000
Report.reportDir = reports/PeopleRank_Test/2
Report.report1 = MessageStatsReport
Report.report2 = MessageStatsReport
Report.report3 = MessageStatsReport

#===========================================================================
# EVENT GENERATOR
#===========================================================================
[ Events ]
Events.nrofEvents = 1
# Membuat pesan baru setiap 20-40 detik agar buffer terisi
Events1.class = MessageEventGenerator
Events1.interval = 20, 40
Events1.size = 500k, 1M
Events1.hosts = 0, 169
Events1.prefix = M
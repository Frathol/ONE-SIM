#===========================================================================
# SCENARIO CONFIGURATION
#===========================================================================
[ Scenario ]
Scenario.name = Task_No3_Haggle4
Scenario.simulateConnections = true
Scenario.updateInterval = 1
Scenario.endTime = 43200
Scenario.nrofHostGroups = 1

#===========================================================================
# GROUP SETTINGS 
#===========================================================================
[ Group ]
Group.groupID = n
Group.nrofHosts = 36
Group.router = EpidemicRouter
Group.bufferSize = 100M
Group.nrofInterfaces = 1
Group.interface1 = btInterface

Group.movementModel = StationaryMovement
Group.nodeLocation = 0,0

Group.msgTtl = 1440

#===========================================================================
# (HAGGLE)
#===========================================================================
[ Events ]
Events.nrof = 2

# Event 1: Trace Koneksi
Events1.class = ExternalEventsReader
Events1.filePath = data/events/Haggle4-Cam-Imote.csv

# Event 2: Pembuat Pesan
Events2.class = MessageEventGenerator
Events2.interval = 100, 300
Events2.size = 100k, 500k
Events2.hosts = 0, 35
Events2.prefix = HAG_MSG

#===========================================================================
# WORLD & REPORT SETTINGS
#===========================================================================
[ MovementModel ]
MovementModel.worldSize = 5000, 5000
MovementModel.warmup = 0

[ Report ]
Report.nrofReports = 3
Report.reportDir = reports/Task_No3_Haggle4/
Report.report1 = MessageStatsReport
Report.report2 = ContactAndMessageReport
Report.report3 = MessageTraceExcelReport